# DENON AVR via HEOS integration (alternative to IR control in ../zigbee-tuya-ir-module-with-slzb/ir-scripts.yaml)
heos_avr_on_off:
  alias: heos avr on-off
  sequence:
    - action: media_player.toggle
      target:
        entity_id: media_player.denon_avr_x2700h
  description: ''

heos_avr_vol_plus:
  alias: heos avr vol plus
  sequence:
    - action: media_player.volume_up
      target:
        entity_id: media_player.denon_avr_x2700h
  description: ''

heos_avr_vol_less:
  alias: heos avr vol less
  sequence:
    - action: media_player.volume_down
      target:
        entity_id: media_player.denon_avr_x2700h
  description: ''

heos_avr_mute:
  alias: heos avr mute
  sequence:
    - action: media_player.volume_mute
      target:
        entity_id: media_player.denon_avr_x2700h
      data:
        is_volume_muted: >-
          {{ not state_attr('media_player.denon_avr_x2700h', 'is_volume_muted') }}
  description: ''

heos_avr_8k:
  alias: heos avr 8k
  sequence:
    - action: media_player.select_source
      target:
        entity_id: media_player.denon_avr_x2700h
      data:
        source: "8K"
  description: ''
