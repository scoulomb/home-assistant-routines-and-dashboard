# DENON AVR via HEOS and Denon AVR integrations (alternative to IR control in ../zigbee-tuya-ir-module-with-slzb/ir-scripts.yaml)
# Power uses Denon AVR integration (media_player.denon_avr_x2700h_3) for standby support;
# volume/mute/source use HEOS integration (media_player.denon_avr_x2700h).
# Actions discovered via http://homeassistant.local:8123/config/automation/edit/new
heos_avr_on_off:
  alias: heos avr on-off
  sequence:
    # Uses Denon AVR integration (not HEOS) — supports power toggle even from standby
    - action: media_player.toggle
      target:
        entity_id: media_player.denon_avr_x2700h_3
  description: ''

heos_avr_vol_plus:
  alias: heos avr vol plus
  sequence:
    - action: media_player.volume_up
      target:
        entity_id: media_player.denon_avr_x2700h
  description: ''

heos_avr_vol_less:
  alias: heos avr vol less
  sequence:
    - action: media_player.volume_down
      target:
        entity_id: media_player.denon_avr_x2700h
  description: ''

heos_avr_mute:
  alias: heos avr mute
  sequence:
    - action: media_player.volume_mute
      target:
        entity_id: media_player.denon_avr_x2700h
      data:
        is_volume_muted: >-
          {{ not state_attr('media_player.denon_avr_x2700h', 'is_volume_muted') }}
  description: ''

# Action discovered via http://homeassistant.local:8123/config/automation/edit/new
heos_avr_8k:
  alias: heos avr 8k
  sequence:
    - action: media_player.play_media
      metadata: {}
      target:
        entity_id: media_player.denon_avr_x2700h
      data:
        media:
          media_content_id: >-
            heos://media/735067990/station?name=APPLE+TV&image_url=&playable=True&browsable=False&media_id=inputs%2Faux_8k
          media_content_type: ""
          metadata:
            title: APPLE TV
            thumbnail: ""
            media_class: track
            children_media_class: null
            navigateIds:
              - {}
              - media_content_type: ""
                media_content_id: >-
                  heos://media/1027/heos_service?name=AUX+Input&image_url=https%3A%2F%2Fproduction.ws.skyegloup.com%3A443%2Fmedia%2Fimages%2Fservice%2Flogos%2Fmusicsource_logo_aux.png&available=True
              - media_content_type: ""
                media_content_id: >-
                  heos://media/735067990/heos_service?name=Denon+AVR-X2700H&image_url=https%3A%2F%2Fproduction.ws.skyegloup.com%3A443%2Fmedia%2Fimages%2Fservice%2Flogos%2Fmusicsource_logo_aux.png&playable=False&browsable=True
            browse_entity_id: media_player.denon_avr_x2700h
  description: ''
