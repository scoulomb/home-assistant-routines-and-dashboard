# Automation: Physical button triggers Stop Music script
# Paste into automations.yaml on HA instance
# Reload: http://homeassistant.local:8123/developer-tools/yaml (Automations)
# Discover device_id by pressing the button and checking http://homeassistant.local:8123/logbook
# and creating an automation at http://homeassistant.local:8123/config/automation/edit/new (gives device_id and syntax)
# Device page: http://homeassistant.local:8123/config/devices/device/4390745362032b639a615b61b86d9eaa


- id: stop_music_button
  alias: Stop Music Button
  description: ""
  mode: single
  # Dimmer switch global (device_id: 4390745362032b639a615b61b86d9eaa)
  triggers:
    - device_id: 4390745362032b639a615b61b86d9eaa
      domain: hue
      type: initial_press
      subtype: 2
      trigger: device
  conditions: []
  action:
    - action: script.turn_on
      target:
        entity_id: script.stop_music


- id: cut_music_plug_button
  alias: Cut Music Plug Button
  description: ""
  mode: single
  # Dimmer switch global (device_id: 4390745362032b639a615b61b86d9eaa)
  triggers:
    - device_id: 4390745362032b639a615b61b86d9eaa
      domain: hue
      type: initial_press
      subtype: 3
      trigger: device
  conditions: []
  action:
    - action: script.turn_on
      target:
        entity_id: script.cut_music_plug
