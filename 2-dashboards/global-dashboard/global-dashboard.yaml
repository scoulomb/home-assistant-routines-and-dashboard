title: Dream Home
views:
  # ═══════════════════════════════════════════════════════════════
  # TAB 1: GLOBAL — Overview & All-at-once controls
  # ═══════════════════════════════════════════════════════════════
  - path: global
    title: Global
    icon: mdi:home
    cards:
      - type: vertical-stack
        cards:
          - type: markdown
            content: "## Quick Actions"
          - type: horizontal-stack
            cards:
              - type: button
                entity: scene.go_to_bed_ha
                name: Go to Bed
                icon: mdi:bed
                show_name: true
                show_icon: true
                tap_action:
                  action: call-service
                  service: scene.turn_on
                  target:
                    entity_id: scene.go_to_bed_ha
              - type: button
                entity: scene.wake_up_ha
                name: Wake Up
                icon: mdi:weather-sunny
                show_name: true
                show_icon: true
                tap_action:
                  action: call-service
                  service: scene.turn_on
                  target:
                    entity_id: scene.wake_up_ha
              - type: button
                entity: script.play_random_music
                name: Play Music
                icon: mdi:music-box
                show_name: true
                show_icon: true
                tap_action:
                  action: call-service
                  service: script.turn_on
                  target:
                    entity_id: script.play_random_music
              - type: button
                entity: script.launch_new_jukebox
                name: New Jukebox
                icon: mdi:music-box-multiple
                show_name: true
                show_icon: true
                tap_action:
                  action: call-service
                  service: script.turn_on
                  target:
                    entity_id: script.launch_new_jukebox
              - type: button
                entity: scene.leave_home
                name: Leave Home
                icon: mdi:door-open
                show_name: true
                show_icon: true
                tap_action:
                  action: call-service
                  service: scene.turn_on
                  target:
                    entity_id: scene.leave_home
              - type: button
                entity: scene.turn_on_ac_living
                name: AC Living
                icon: mdi:air-conditioner
                show_name: true
                show_icon: true
                tap_action:
                  action: call-service
                  service: scene.turn_on
                  target:
                    entity_id: scene.turn_on_ac_living

      - type: vertical-stack
        cards:
          - type: markdown
            content: "## All Lights"
          - type: entities
            entities:
              - entity: light.living_room
                name: Living Room
              - entity: light.bedroom
                name: Bedroom
              - entity: light.bathroom
                name: Bathroom
              - entity: light.entrance
                name: Entrance
              - entity: light.library
                name: Library
              - entity: light.dressing
                name: Dressing
              - entity: light.balcony
                name: Balcony
              - entity: light.closet
                name: Closet

      - type: vertical-stack
        cards:
          - type: markdown
            content: "## Shutters"
          - type: entities
            entities:
              - entity: cover.salon_module_shutter
                name: Living Room Shutter
              - entity: cover.sunilus_io
                name: Bedroom Sunilus
          - type: horizontal-stack
            cards:
              - type: button
                entity: button.salon_module_shutter_my_position
                name: Living — My Position
                icon: mdi:window-shutter
                show_name: true
              - type: button
                entity: button.sunilus_io_my_position
                name: Bedroom — My Position
                icon: mdi:window-shutter
                show_name: true

      - type: vertical-stack
        cards:
          - type: markdown
            content: "## Energy"
          - type: energy-distribution
            link_dashboard: true
          - type: entities
            entities:
              - entity: sensor.energy_monitoring_sensor_electric_power_consumption
                name: Current Power
              - entity: sensor.energy_monitoring_sensor_electric_energy_consumption
                name: Total Energy

      - type: weather-forecast
        entity: weather.forecast_home
        show_forecast: true

  # ═══════════════════════════════════════════════════════════════
  # TAB 2: LIVING ROOM
  # ═══════════════════════════════════════════════════════════════
  - path: living-room
    title: Living Room
    icon: mdi:sofa
    cards:
      - type: vertical-stack
        cards:
          - type: markdown
            content: "## Ceiling Lights"
          - type: grid
            columns: 4
            square: false
            cards:
              - type: light
                entity: light.living_1
                name: "1"
              - type: light
                entity: light.living_2
                name: "2"
              - type: light
                entity: light.living_3
                name: "3"
              - type: light
                entity: light.living_4
                name: "4"
              - type: light
                entity: light.living_5
                name: "5"
              - type: light
                entity: light.living_6
                name: "6"
              - type: light
                entity: light.living_7
                name: "7"
              - type: light
                entity: light.living_8
                name: "8"

      - type: light
        entity: light.living_room
        name: All Living Room Lights

      - type: vertical-stack
        cards:
          - type: markdown
            content: "## Shutter"
          - type: entities
            entities:
              - entity: cover.salon_module_shutter
                name: Shutter
              - entity: button.salon_module_shutter_my_position
                name: My Position

      - type: vertical-stack
