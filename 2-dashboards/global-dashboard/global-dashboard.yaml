          - type: markdown
            content: "## Scenes"
          - type: horizontal-stack
            cards:
              - type: button
                entity: scene.living_room_bright
                name: Bright
                icon: mdi:brightness-7
              - type: button
                entity: scene.living_room_concentration
                name: Concentrate
                icon: mdi:head-lightbulb
              - type: button
                entity: scene.living_room_lecture
                name: Lecture
                icon: mdi:book-open-variant
              - type: button
                entity: scene.living_room_detente
                name: Détente
                icon: mdi:spa
              - type: button
                entity: scene.living_room_lumiere_naturelle
                name: Natural
                icon: mdi:white-balance-sunny
          - type: horizontal-stack
            cards:
              - type: button
                entity: scene.living_room_dimmed
                name: Dimmed
                icon: mdi:brightness-4
              - type: button
                entity: scene.living_room_repos
                name: Repos
                icon: mdi:sleep
              - type: button
                entity: scene.living_room_stimulation
                name: Stimulation
                icon: mdi:lightning-bolt
              - type: button
                entity: scene.living_room_veilleuse
                name: Veilleuse
                icon: mdi:lightbulb-night
              - type: button
                entity: scene.living_room_rainbow_scene
