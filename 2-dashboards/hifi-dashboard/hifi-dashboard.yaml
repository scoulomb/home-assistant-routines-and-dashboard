# Dashboard built on top of IR scripts defined in:
# ../../1-scripts/zigbee-tuya-ir-module-with-slzb/zigbee-ZS06-and-UFO-R11.md
# See also: ./README.md for generation instructions.
title: SLZB Remote
views:
  - title: Smart Plugs
    path: smart-plugs
    icon: mdi:power-plug
    cards:
      - type: vertical-stack
        cards:
          - type: markdown
            content: "## HiFi System"
          - type: entities
            entities:
              - entity: light.hue_smart_plug_hi_fi_bedroom
                name: HiFi Bedroom
                icon: mdi:speaker
              - entity: light.hue_smart_plug_hi_fi_living
                name: HiFi Living
                icon: mdi:speaker
              - entity: light.music_virtual_room
                name: Music Virtual Room
                icon: mdi:music

      - type: vertical-stack
