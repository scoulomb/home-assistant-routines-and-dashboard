# NOTE: CD / Tuner / Tape / AUX / USB are the physical labels on the Atoll remote.
# Their actual mappings depend on the connected device:
#   - HD120 (living room): CD → Line 1 (CD 6007), Tuner → Line 2, Tape → Optical (Heos Link streamer), AUX → Coaxial (MS120 streamer), USB → USB
#   - PR300 (bedroom): CD → MS120 streamer, Tuner → Heos Link streamer, Tape → Tape, AUX → AUX 
# No BT direct on global remote
# I kept BT for bedroom preamp (UFO-R11) for consistency with living-room remote (ZS06), even though it's not used in practice.
